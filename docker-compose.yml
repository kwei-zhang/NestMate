services:
  db:
    image: postgres:16
    container_name: nestmate-db
    environment:
      POSTGRES_USER: nestmate
      POSTGRES_PASSWORD: nestmate
      POSTGRES_DB: nestmate
    ports:
      - "5432:5432"
    volumes:
      - nestmate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestmate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nestmate_pgdata:
